<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sagar Adhikari</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#0f172a;
      color:white;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 10%;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      position:sticky;
      top:0;
    }

    .logo{
      font-size:28px;
      font-weight:700;
      color:#38bdf8;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      transition:0.3s;
    }

    nav a:hover{
      color:#38bdf8;
    }

    .hero{
      height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      background:linear-gradient(to right,#0f172a,#1e293b);
    }

    .hero-content h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero-content span{
      color:#38bdf8;
    }

    .hero-content p{
      font-size:20px;
      margin-bottom:30px;
      color:#cbd5e1;
    }

    .btn{
      display:inline-block;
      padding:14px 32px;
      background:#38bdf8;
      color:#0f172a;
      text-decoration:none;
      border-radius:30px;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
      transform:scale(1.05);
    }

    footer{
      text-align:center;
      padding:20px;
      background:#020617;
      color:#94a3b8;
    }

    @media(max-width:768px){
      .hero-content h1{
        font-size:40px;
      }

      nav{
        display:none;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Sagar</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Hello, I'm <span>Sagar Adhikari</span></h1>

    <p>
      Student at Kyungdong University | Future Web Developer
    </p>

    <a href="about.html" class="btn">Learn More</a>
  </div>
</section>

<footer>
  © 2026 Sagar Adhikari | All Rights Reserved
</footer>

</body>
</html>
